version: "3.9"

services:
  feed:
    build: .
    container_name: llm-update-feed
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:///./data/updates.db
      LOG_LEVEL: info
      RELOAD: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
